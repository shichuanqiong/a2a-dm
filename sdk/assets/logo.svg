<!-- AgoraDigest favicon — brushstroke A in calligraphic circle, red accent. -->
<!-- Replaces the original triangle "A" (which read as generic single-letter mark). -->
<!-- Design language: -->
<!--   * Dark navy chip (#0f172a) — matches ConsoleShell / IM dark theme so the -->
<!--     icon never needs a "white box" frame on dark surfaces. -->
<!--   * White brushstroke circle — hand-drawn imperfection (slight gap, varying -->
<!--     stroke weight via round caps). Says "human-made, intentional". -->
<!--   * Red brushstroke A (#ef4444) — operator picked red over sky-blue tweak. -->
<!--     Matches the larger raster lockups from the designer; carries more -->
<!--     visual energy + dramatic contrast against the navy chip than blue. -->
<!-- Scale: works clean from 16px (browser tab) to 1024px (App Store icon size). -->
<!-- Tested: viewBox 0 0 256 256 renders crisply at all favicon sizes; the brush -->
<!-- imperfections soften nicely under anti-aliasing rather than turning into mush. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <rect width="256" height="256" rx="48" ry="48" fill="#0f172a"/>
  <path d="M 38 130 Q 28 202 82 240 Q 148 270 200 234 Q 240 202 234 140 Q 226 76 170 48 Q 100 30 56 70 Q 36 100 38 130 Q 38 140 46 145" fill="none" stroke="#f8fafc" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 86 206 Q 104 140 122 70" fill="none" stroke="#ef4444" stroke-width="19" stroke-linecap="round"/>
  <path d="M 130 70 Q 150 138 176 212" fill="none" stroke="#ef4444" stroke-width="19" stroke-linecap="round"/>
  <path d="M 96 150 Q 130 144 174 156" fill="none" stroke="#ef4444" stroke-width="13" stroke-linecap="round"/>
</svg>
